/* ── Typewriter ── */
function Typewriter({ roles }) {
  const [roleIdx, setRoleIdx] = useState(0);
  const [displayed, setDisplayed] = useState('');
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const current = roles[roleIdx];
    let timeout;
    if (!deleting && displayed.length < current.length) {
      timeout = setTimeout(() => setDisplayed(current.slice(0, displayed.length + 1)), 70);
    } else if (!deleting && displayed.length === current.length) {
      timeout = setTimeout(() => setDeleting(true), 1800);
    } else if (deleting && displayed.length > 0) {
      timeout = setTimeout(() => setDisplayed(displayed.slice(0, -1)), 40);
    } else if (deleting && displayed.length === 0) {
      setDeleting(false);
      setRoleIdx((roleIdx + 1) % roles.length);
    }
    return () => clearTimeout(timeout);
  }, [displayed, deleting, roleIdx, roles]);

  return (
    <p style={{ fontFamily:'var(--mono)', color:'var(--muted)', fontSize:'1rem', marginBottom:'1.5rem' }}>
      $ <span style={{ color:'var(--green)' }}>{displayed}</span>
      <span className="cursor" style={{ color:'var(--accent2)' }}>|</span>
    </p>
  );
}

/* ── Scroll progress bar ── */
function ScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      setProgress(el.scrollTop / (el.scrollHeight - el.clientHeight) * 100);
    };
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <div style={{ position:'fixed', top:0, left:0, right:0, height:2, zIndex:200, background:'rgba(255,255,255,0.05)' }}>
      <div style={{ height:'100%', width:`${progress}%`, background:'linear-gradient(90deg, var(--accent), var(--accent3))', transition:'width 0.1s' }} />
    </div>
  );
}

        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(280px,1fr))', gap:'1.5rem' }}>
          {filteredProjects.map((p, i) => <ProjectCard key={p.num} {...p} index={i} />)}
        </div>
        {filteredProjects.length === 0 && (
          <p style={{ color:'var(--muted)', textAlign:'center', padding:'3rem', fontFamily:'var(--mono)' }}>No projects match this filter.</p>
        )}
      </section>

      <hr style={{ border:'none', borderTop:'1px solid var(--border)', maxWidth:1100, margin:'0 auto' }} />

      {/* EDUCATION */}
      <section id="education" style={{ maxWidth:1100, margin:'0 auto', padding:'5rem 2rem' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:'0.75rem', color:'var(--accent2)', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:'0.5rem' }}>Background</div>
        <h2 style={{ fontSize:'clamp(1.6rem,3vw,2.2rem)', fontWeight:700, letterSpacing:'-0.02em', marginBottom:'3rem' }}>Education</h2>
        <div style={{ display:'flex', flexDirection:'column', gap:'2rem' }}>
          {EDUCATION.map((e, i) => (
            <div key={i} style={{ display:'grid', gridTemplateColumns:'160px 1fr', gap:'2rem' }}>
              <div style={{ fontFamily:'var(--mono)', fontSize:'0.8rem', color:'var(--muted)', paddingTop:4, textAlign:'right' }}>{e.date}</div>
              <div style={{ borderLeft:'1px solid var(--border2)', paddingLeft:'2rem', position:'relative' }}>
                <div style={{ position:'absolute', left:-4.5, top:8, width:8, height:8, borderRadius:'50%', background:'var(--accent2)' }} />
                <h3 style={{ fontSize:'1rem', fontWeight:600, marginBottom:'0.25rem' }}>{e.title}</h3>
                <div style={{ fontSize:'0.85rem', color:'var(--accent3)', marginBottom:'0.5rem' }}>{e.org}</div>
                <p style={{ color:'var(--muted)', fontSize:'0.875rem' }}>{e.detail}</p>
              </div>
            </div>
          ))}
        </div>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid var(--border)', maxWidth:1100, margin:'0 auto' }} />

      {/* CERTS */}
      <section style={{ maxWidth:1100, margin:'0 auto', padding:'5rem 2rem' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:'0.75rem', color:'var(--accent2)', letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:'0.5rem' }}>Extras</div>
        <h2 style={{ fontSize:'clamp(1.6rem,3vw,2.2rem)', fontWeight:700, letterSpacing:'-0.02em', marginBottom:'2rem' }}>Certifications & Achievements</h2>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(260px,1fr))', gap:'1rem' }}>
          {CERTS.map((c,i) => (
            <div key={i} style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'1.25rem 1.5rem', display:'flex', alignItems:'flex-start', gap:'1rem', transition:'border-color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.borderColor='var(--border2)'}
              onMouseLeave={e => e.currentTarget.style.borderColor='var(--border)'}
            >
              <div style={{ fontSize:'1.5rem', flexShrink:0, background:'rgba(108,99,255,0.12)', borderRadius:8, width:44, height:44, display:'flex', alignItems:'center', justifyContent:'center' }}>{c.icon}</div>
              <div>
                <h3 style={{ fontSize:'0.9rem', fontWeight:600, marginBottom:'0.3rem' }}>{c.title}</h3>
                <p style={{ fontSize:'0.8rem', color:'var(--muted)' }}>{c.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </section>

      <hr style={{ border:'none', borderTop:'1px solid var(--border)', maxWidth:1100, margin:'0 auto' }} />

      <ContactSection />

      <footer style={{ textAlign:'center', padding:'2rem', color:'var(--muted)', fontSize:'0.8rem', borderTop:'1px solid var(--border)', fontFamily:'var(--mono)' }}>
        Built with ♥  ·  Dhruv Pandey  ·  2024  ·  dhruv.dev
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
